# Path: /lpms/bio-core-k12/strands/strand-101-variation-inheritance.yaml

id: "OE-STRAND-000101"
type: "oe:Strand"
status: proposed
version: 0.1.0
labels:
  en: "Variation and Inheritance"
description:
  en: >
    Foundational strand establishing that individuals vary and that traits
    are transmitted from parent to offspring — the raw material on which
    Strand 2 (Natural Selection) and Strand 3 (Speciation) both depend.
    Concepts introduced here (Gene, Allele, Population, Inheritance) are
    deliberately reinforced throughout the other two strands rather than
    confined to this one, to maximize horizontal coherence.
typicalGradeBand: "K-12 (spans all bands via subStrands)"
associatedDomains: ["Biology"]
relations:
  prerequisiteOf: ["OE-STRAND-000102", "OE-STRAND-000103"]

subStrands:

  - id: "OE-STRAND-000111"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Noticing Variation and Family Resemblance"
    typicalGradeBand: "K-2"
    required: true
    concepts:
      - id: "OE-CONCEPT-000108"   # Population
        emphasis: primary
      - id: "OE-CONCEPT-000112"   # Inheritance
        emphasis: primary
    performanceIndicators:
      - "Identifies visible differences among individuals of the same familiar species (e.g., dog coat color, leaf shape)."
      - "Describes ways offspring resemble their parents (e.g., puppies look like their parent dogs)."
      - "Sorts a group of similar organisms and notices that no two individuals are identical."

  - id: "OE-STRAND-000112"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Heritable Traits and Simple Population Description"
    typicalGradeBand: "3-5"
    required: true
    concepts:
      - id: "OE-CONCEPT-000112"   # Inheritance
        emphasis: primary
      - id: "OE-CONCEPT-000108"   # Population
        emphasis: primary
    performanceIndicators:
      - "Distinguishes traits that are inherited (eye color) from characteristics acquired during a lifetime (a scar, a learned trick)."
      - "Describes a population as a group of the same kind of organism living in one area."
      - "Predicts that offspring in a population will show a mix of trait variants similar to those of their parent generation."

  - id: "OE-STRAND-000113"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Genes, Alleles, and the Origin of Variation"
    typicalGradeBand: "6-8"
    required: true
    concepts:
      - id: "OE-CONCEPT-000106"   # Gene
        emphasis: primary
      - id: "OE-CONCEPT-000107"   # Allele
        emphasis: primary
      - id: "OE-CONCEPT-000103"   # Mutation
        emphasis: primary
      - id: "OE-CONCEPT-000108"   # Population
        emphasis: reinforcing
    performanceIndicators:
      - "Explains that genes are units of inheritance and that alleles are alternate forms of a gene."
      - "Explains that mutation is a random source of new heritable variation, not directed by an organism's needs."
      - "Describes a population in terms of the range of allele variants present within it, not a single fixed 'type'."
    relations:
      recommendedSequence: []

  - id: "OE-STRAND-000114"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Population-Level Genetics and Allele Frequency"
    typicalGradeBand: "9-12"
    required: true
    concepts:
      - id: "OE-CONCEPT-000106"   # Gene
        emphasis: reinforcing
      - id: "OE-CONCEPT-000107"   # Allele
        emphasis: primary
      - id: "OE-CONCEPT-000108"   # Population
        emphasis: primary
      - id: "OE-CONCEPT-000103"   # Mutation
        emphasis: reinforcing
      - id: "OE-CONCEPT-000111"   # Drift (cross-ref to Strand 2)
        emphasis: reinforcing
      - id: "OE-CONCEPT-000115"   # Selection Pressure (cross-ref to Strand 2)
        emphasis: reinforcing
    performanceIndicators:
      - "Describes a population in terms of allele frequencies and explains that these frequencies can change across generations."
      - "Distinguishes changes in allele frequency caused by selection pressure from changes caused by drift."
      - "Uses a simple quantitative model (e.g., a bead or simulation activity) to track allele frequency change over generations."