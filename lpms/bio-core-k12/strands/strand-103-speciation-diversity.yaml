# Path: /lpms/bio-core-k12/strands/strand-103-speciation-diversity.yaml

id: "OE-STRAND-000103"
type: "oe:Strand"
status: proposed
version: 0.1.0
labels:
  en: "Speciation and Diversity of Life"
description:
  en: >
    Macroevolutionary strand. Depends heavily on Strand 1 (population,
    allele) and Strand 2 (natural selection, selection pressure, drift) as
    the mechanisms that drive divergence — this strand is where horizontal
    coherence is most heavily exercised, since almost every performance
    indicator here reinforces a concept introduced in one of the other
    two strands rather than introducing self-contained new mechanisms.
typicalGradeBand: "K-12 (spans all bands via subStrands)"
associatedDomains: ["Biology"]
relations:
  prerequisiteOf: []

subStrands:

  - id: "OE-STRAND-000131"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Many Different Kinds of Living Things"
    typicalGradeBand: "K-2"
    required: true
    concepts:
      - id: "OE-CONCEPT-000109"   # Species
        emphasis: primary
      - id: "OE-CONCEPT-000116"   # Extinction
        emphasis: primary
    performanceIndicators:
      - "Sorts organisms into groups based on shared observable features."
      - "Recognizes that some kinds of living things existed long ago and no longer exist today (e.g., dinosaurs)."

  - id: "OE-STRAND-000132"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Species, Relatedness, and Extinction"
    typicalGradeBand: "3-5"
    required: true
    concepts:
      - id: "OE-CONCEPT-000109"   # Species
        emphasis: primary
      - id: "OE-CONCEPT-000114"   # Common Ancestor
        emphasis: primary
      - id: "OE-CONCEPT-000116"   # Extinction
        emphasis: reinforcing
    performanceIndicators:
      - "Describes a species as a group of organisms that can reproduce with one another."
      - "Uses a simple diagram to show that two different species can share an ancestor further back in time."
      - "Explains that extinction means a species is permanently gone, not temporarily hidden."

  - id: "OE-STRAND-000133"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "How Populations Become New Species"
    typicalGradeBand: "6-8"
    required: true
    concepts:
      - id: "OE-CONCEPT-000110"   # Speciation
        emphasis: primary
      - id: "OE-CONCEPT-000113"   # Phylogeny
        emphasis: primary
      - id: "OE-CONCEPT-000109"   # Species
        emphasis: reinforcing
      - id: "OE-CONCEPT-000108"   # Population (cross-ref to Strand 1)
        emphasis: reinforcing
      - id: "OE-CONCEPT-000102"   # Natural Selection (cross-ref to Strand 2)
        emphasis: reinforcing
      - id: "OE-CONCEPT-000115"   # Selection Pressure (cross-ref to Strand 2)
        emphasis: reinforcing
    performanceIndicators:
      - "Explains speciation as the process by which populations diverge until they can no longer interbreed."
      - "Explains that different selection pressures acting on separated populations can drive this divergence."
      - "Reads and constructs a simple phylogenetic tree to represent relatedness among species."

  - id: "OE-STRAND-000134"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Evidence, Deep Time, and Patterns of Extinction"
    typicalGradeBand: "9-12"
    required: true
    concepts:
      - id: "OE-CONCEPT-000113"   # Phylogeny
        emphasis: primary
      - id: "OE-CONCEPT-000114"   # Common Ancestor
        emphasis: reinforcing
      - id: "OE-CONCEPT-000116"   # Extinction
        emphasis: primary
      - id: "OE-CONCEPT-000107"   # Allele (cross-ref to Strand 1)
        emphasis: reinforcing
      - id: "OE-CONCEPT-000103"   # Mutation (cross-ref to Strand 1)
        emphasis: reinforcing
      - id: "OE-CONCEPT-000111"   # Drift (cross-ref to Strand 2)
        emphasis: reinforcing
    performanceIndicators:
      - "Constructs a phylogeny from morphological and molecular evidence and justifies the placement of a common ancestor node."
      - "Distinguishes background extinction rate from mass extinction events using fossil record evidence."
      - "Evaluates a claim of common ancestry using multiple independent lines of evidence (genetic, morphological, biogeographic)."