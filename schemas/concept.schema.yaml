# ============================================================================
# OpenEvo ConceptBase — Concept Schema
# ============================================================================
# Path: /schemas/concept.schema.yaml
#
# Validates instances of oe:Concept (see /ontologies/core.yaml). Concept
# instances are authored inside controlled vocabulary files
# (/controlled-vocabularies/*.yaml), one entry per term. This schema
# validates each entry's structure; SKOS relation targets (skos:broader,
# etc.) are validated for ID-pattern correctness here, and for referential
# integrity (does the target ID actually exist) by the separate build/
# validation pipeline, not by JSON Schema alone.
# ============================================================================

"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://www.w3id.org/openevo/schemas/concept.schema.json"

meta:
  id: OE-SCHEMA-CONCEPT
  version: 1.2.0
  status: stable
  authors:
    - name: OpenEvo ConceptBase Maintainers
  license: CC-BY-NC-SA-4.0
  ontologyClass: oe:Concept
  phase: 1

type: object

properties:

  id:
    type: string
    description: >
      Either a permanent oe:Concept identifier or a sandbox-tier
      identifier (RFC-0001, spec §4.5) — the tier-specific pattern is
      enforced by the oneOf branches below, not here. Completes RFC-0001's
      sandbox-concept wiring, which defined sandboxConceptId/sandboxMeta
      in common.defs.yaml but never actually connected them here — flagged
      as a known gap by RFC-0010 and closed here rather than left
      outstanding, using the identical oneOf pattern RFC-0010 applied to
      lpm.schema.yaml.

  type:
    const: "oe:Concept"

  status:
    "$ref": "common.defs.yaml#/$defs/status"
    description: >
      Permanent-tier lifecycle status. Mutually exclusive with
      sandboxMeta — see the oneOf branches below.

  sandboxMeta:
    "$ref": "common.defs.yaml#/$defs/sandboxMeta"
    description: >
      Sandbox-tier lifecycle metadata (RFC-0001). Mutually exclusive
      with status — see the oneOf branches below.

  version:
    "$ref": "common.defs.yaml#/$defs/semver"

  definedInVocabulary:
    "$ref": "common.defs.yaml#/$defs/vocabRef"
    description: >
      The single controlled vocabulary this Concept is native to. A
      Concept may still be *aligned* to concepts in other vocabularies
      (see /alignments/, Phase 2), but has exactly one home vocabulary.

  labels:
    "$ref": "common.defs.yaml#/$defs/localizedString"
    description: Preferred label per language.

  aliases:
    "$ref": "common.defs.yaml#/$defs/localizedStringArray"
    description: Alternate labels/synonyms per language.

  definitions:
    "$ref": "common.defs.yaml#/$defs/localizedDisciplinaryDefinitions"
    description: >
      Per-language, per-discipline definitions. This is the field that
      implements the disambiguation model (e.g. "Selection" defined
      separately under biology / culture / education / ai) described in
      Spec v0.2.

  relations:
    type: object
    description: >
      SKOS relations to other Concept instances. All target values are
      Concept IDs; cross-vocabulary meaning is asserted here only for
      same-vocabulary relations. Cross-vocabulary claims belong in
      /alignments/ (Phase 2), where they carry provenance and a
      matchType, rather than being asserted directly on the concept.
    properties:
      "skos:broader":
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/anyConceptRef" }
      "skos:narrower":
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/anyConceptRef" }
      "skos:related":
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/anyConceptRef" }
    additionalProperties: false

  examples:
    type: array
    items:
      type: string
    description: >
      Illustrative examples of the concept in use. Not localized in
      Phase 1 — kept as a simple string array to avoid over-structuring
      a secondary field; may become localized in a later minor version
      if contributor demand warrants it.

  nonExamples:
    type: array
    items:
      type: string

  citations:
    type: array
    items:
      "$ref": "common.defs.yaml#/$defs/citation"

  extensions:
    "$ref": "common.defs.yaml#/$defs/extensions"

required:
  - id
  - type
  - version
  - definedInVocabulary
  - labels
  - definitions

additionalProperties: false

oneOf:
  - description: Permanent-tier concept (unchanged behavior from before this fix).
    properties:
      id: { "$ref": "common.defs.yaml#/$defs/conceptId" }
      status: { "$ref": "common.defs.yaml#/$defs/status" }
    required: [id, status]
    not:
      required: [sandboxMeta]
  - description: Sandbox-tier concept (RFC-0001).
    properties:
      id: { "$ref": "common.defs.yaml#/$defs/sandboxConceptId" }
      sandboxMeta: { "$ref": "common.defs.yaml#/$defs/sandboxMeta" }
    required: [id, sandboxMeta]
    not:
      required: [status]