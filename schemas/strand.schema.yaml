# ============================================================================
# OpenEvo ConceptBase — Strand Schema
# ============================================================================
# Path: /schemas/strand.schema.yaml
#
# Validates instances of oe:Strand and oe:SubStrand (see /ontologies/core.yaml).
# A Strand file is the content that an LPM's `strands[].repository` pointer
# resolves to. SubStrands are modeled as nested `subStrands[]` entries using
# the same shape (self-referential via $ref), consistent with the ontology's
# design: SubStrand is a subclass of Strand connected via oe:hasSubStrand,
# not a separate class. The recommended 2-level nesting limit is enforced by
# validation tooling (not by this schema), per the ontology's versioning notes.
#
# `concepts[].emphasis` (primary | reinforcing) is the mechanism that makes
# horizontal coherence machine-checkable: a validator can count how many
# strands/substrands reinforce a given concept across an LPM to verify that
# core concepts are genuinely repeated, not merely mentioned once.
# ============================================================================

"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://www.w3id.org/openevo/schemas/strand.schema.json"

meta:
  id: OE-SCHEMA-STRAND
  version: 1.3.0
  status: stable
  authors:
    - name: OpenEvo ConceptBase Maintainers
  license: CC-BY-NC-SA-4.0
  ontologyClass: [oe:Strand, oe:SubStrand]
  phase: 1

type: object

properties:

  id:
    type: string
    description: >
      Either a permanent oe:Strand/oe:SubStrand identifier or, since
      this fix (sibling to RFC-0010), a sandbox-tier identifier for
      Strand/SubStrand content authored within a sandbox-tier LPM
      (RFC-0010) — the tier-specific pattern is enforced by the oneOf
      branches below, not here.

  type:
    type: string
    enum: ["oe:Strand", "oe:SubStrand"]

  status:
    "$ref": "common.defs.yaml#/$defs/status"
    description: >
      Permanent-tier lifecycle status. Mutually exclusive with
      sandboxMeta — see the oneOf branches below.

  sandboxMeta:
    "$ref": "common.defs.yaml#/$defs/sandboxMeta"
    description: >
      Sandbox-tier lifecycle metadata. Mutually exclusive with status —
      see the oneOf branches below.

  version:
    "$ref": "common.defs.yaml#/$defs/semver"

  labels:
    "$ref": "common.defs.yaml#/$defs/localizedString"

  description:
    "$ref": "common.defs.yaml#/$defs/localizedString"

  typicalGradeBand:
    type: string
    description: >
      Informal grade-band label (e.g. "K-2", "6-8"). Plain string pending
      formal gradeSchema resources (Phase 3). Not validated against a
      controlled set in Phase 1.

  required:
    type: boolean
    default: true
    description: >
      Whether this Strand/SubStrand is obligate (oe:required=true) or
      optional/elective/regional-extension (false) within its parent.

  concepts:
    type: array
    description: >
      Concepts this Strand/SubStrand addresses (oe:hasConcept). `emphasis`
      distinguishes concepts this strand is structurally organized around
      (primary) from concepts pulled in from other strands to reinforce
      cross-strand relations (reinforcing) — the operational basis for
      horizontal coherence.
    items:
      "$ref": "common.defs.yaml#/$defs/conceptEmphasisRef"

  performanceIndicators:
    type: array
    items:
      type: string
    description: Observable learning outcomes for this level.

  associatedDomains:
    type: array
    items:
      type: string
    description: >
      Informal subject-domain tags (e.g. "Biology", "Computer Science").
      Plain strings pending formal subjectSchema resources (Phase 3).

  relations:
    type: object
    description: >
      Strand-to-strand relations from the ontology (recommendedSequence,
      alternativeSequence, parallel, prerequisiteOf, foundationalTo).
      Targets are sibling or cross-strand IDs, not child subStrands (use
      subStrands[] for that). A strand pair MUST NOT be linked by both
      prerequisiteOf and parallel/foundationalTo in conflicting
      directions — prerequisiteOf is a hard gate, parallel is symmetric
      concurrent teaching, and foundationalTo is the weaker "introduce
      first, but keep reinforcing alongside" spiral-curriculum relation.
    properties:
      recommendedSequence:
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/strandId" }
      alternativeSequence:
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/strandId" }
      parallel:
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/strandId" }
      prerequisiteOf:
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/strandId" }
      foundationalTo:
        type: array
        items: { "$ref": "common.defs.yaml#/$defs/strandId" }
    additionalProperties: false

  subStrands:
    type: array
    items:
      "$ref": "#"
    description: >
      Nested child Strand/SubStrand entries (oe:hasSubStrand). Recommended
      maximum depth: 2 levels total, enforced by validation tooling.

  contextAssumption:
    type: array
    items:
      "$ref": "common.defs.yaml#/$defs/contextAssumption"
    minItems: 1
    description: >
      Which named instructional-context assumption(s) this SubStrand body
      is designed for (oe:contextAssumption, RFC-0009). Optional and
      additive — a SubStrand with no contextAssumption makes no claim
      either way and remains fully valid, exactly as all pre-RFC-0009
      SubStrand content does. Semantically meaningful only on
      oe:SubStrand (mirrors oe:required's existing domain restriction,
      enforced by the ontology, not by this JSON Schema).

  trajectoryVariants:
    type: array
    items:
      allOf:
        - "$ref": "#"
        - required: [contextAssumption]
    minItems: 1
    description: >
      Alternate, full SubStrand bodies (oe:hasTrajectoryVariant, RFC-0009)
      occupying the same conceptual slot as this SubStrand, each tagged
      with a mandatory contextAssumption (unlike the optional field
      above — a variant without a stated assumption would defeat the
      purpose of branching). The SubStrand carrying this field is itself
      the default/fallback body: a consumer that has not declared which
      context assumption applies MUST use this SubStrand's own content
      and MAY ignore trajectoryVariants entirely, so no existing consumer
      behavior changes. A context-aware consumer MAY instead select
      whichever variant's contextAssumption matches its own declared
      context.

      trajectoryVariants entries are alternate realizations of the same
      node, not children of it: they MUST NOT be counted toward the
      recommended two-level subStrands[] nesting-depth limit (spec §6.5),
      and — to keep this mechanism simple and avoid an unbounded
      variants-of-variants regress — a trajectoryVariants entry MUST NOT
      itself carry a non-empty subStrands[] or trajectoryVariants[].
      Validation tooling enforcing the nesting-depth limit MUST traverse
      subStrands[] only.

  learningObjects:
    type: array
    description: >
      Learning Objects this Strand/SubStrand references (oe:hasLearningObject).
      Loosely coupled by design, mirroring lpm.schema.yaml's `strands[]`
      pattern: only an ID and an external repository pointer are required
      here. The referenced file owns the full oe:LearningObject structure,
      validated there against learningObject.schema.yaml.
    items:
      type: object
      properties:
        id:
          "$ref": "common.defs.yaml#/$defs/learningObjectId"
        repository:
          type: string
          format: uri-reference
          description: >
            URI, or path within a monorepo, of the external repository
            where this Learning Object's full definition lives.
        required:
          type: boolean
          default: true
      required: [id]
      additionalProperties: false

  extensions:
    "$ref": "common.defs.yaml#/$defs/extensions"

required: [id, type, version, labels]
additionalProperties: false

oneOf:
  - description: Permanent-tier Strand/SubStrand (unchanged behavior from before this fix).
    properties:
      id: { "$ref": "common.defs.yaml#/$defs/strandId" }
      status: { "$ref": "common.defs.yaml#/$defs/status" }
    required: [id, status]
    not:
      required: [sandboxMeta]
  - description: >
      Sandbox-tier Strand/SubStrand — content authored within a
      sandbox-tier LPM fork (RFC-0010).
    properties:
      id: { "$ref": "common.defs.yaml#/$defs/sandboxStrandId" }
      sandboxMeta: { "$ref": "common.defs.yaml#/$defs/sandboxMeta" }
    required: [id, sandboxMeta]
    not:
      required: [status]