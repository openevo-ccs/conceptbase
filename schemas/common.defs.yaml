# ============================================================================
# OpenEvo ConceptBase — Common Schema Definitions
# ============================================================================
# Path: /schemas/common.defs.yaml
#
# Purpose: Shared $defs used across all ConceptBase schemas (concept, lpm,
# strand, and future: competency, assessment, evidence...). Defined once
# here and referenced via $ref so identifier patterns, versioning rules,
# and multilingual field structure stay identical across the whole schema
# set as it grows. Not a standalone validatable schema — a defs library.
#
# Namespace note: this file's "$id" identifies the schema document itself
# within the JSON Schema resolution system (a distinct concern from the
# RDF/JSON-LD ontology namespace declared in /ontologies/core.yaml). Both
# now share the same base path under www.w3id.org/openevo/ for a single
# canonical namespace across the ConceptBase ecosystem.
# ============================================================================

"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://www.w3id.org/openevo/schemas/common.defs.json"

meta:
  id: OE-SCHEMA-COMMON
  version: 1.4.0
  status: stable
  authors:
    - name: OpenEvo ConceptBase Maintainers
  license: CC-BY-NC-SA-4.0
  phase: 1

"$defs":

  # --- Identifiers -----------------------------------------------------

  conceptId:
    type: string
    pattern: "^OE-CONCEPT-[0-9]{6}$"
    description: >
      Permanent identifier for an oe:Concept instance. Resolves under
      https://www.w3id.org/openevo/concept/{id}.

  lpmId:
    type: string
    pattern: "^OE-LPM-[0-9]{6}$"
    description: >
      Permanent identifier for an oe:LPM instance. Resolves under
      https://www.w3id.org/openevo/lpm/{id}.

  strandId:
    type: string
    pattern: "^OE-STRAND-[0-9]{6}$"
    description: >
      Permanent identifier for an oe:Strand/oe:SubStrand instance.
      Resolves under https://www.w3id.org/openevo/strand/{id}.

  learningObjectId:
    type: string
    pattern: "^OE-LO-[0-9]{6}$"
    description: >
      Permanent identifier for an oe:LearningObject instance. Resolves
      under https://www.w3id.org/openevo/lo/{id}.

  competencyId:
    type: string
    pattern: "^OE-COMPETENCY-[0-9]{6}$"
    description: >
      Permanent identifier for an oe:Competency instance (RFC-0002).
      Resolves under https://www.w3id.org/openevo/competency/{id}. Never
      aliased from the CASE CFItem sourcedId/uri a competency may have
      been profiled from — those are retained separately as provenance
      (see schemas/competency.schema.yaml#/properties/provenance).

  alignmentId:
    type: string
    pattern: "^OE-ALIGN-[0-9]{6}$"
    description: >
      Permanent identifier for a Phase 2 cross-vocabulary Alignment
      record. Resolves under https://www.w3id.org/openevo/align/{id}.

  sandboxConceptId:
    type: string
    pattern: "^OE-SANDBOX-CONCEPT-[0-9]{6}$"
    description: >
      Provisional identifier for a sandbox-tier concept entry (RFC-0001,
      spec §4.5). Structurally distinct from conceptId so the two can
      never be mistaken for each other. Not subject to the never-delete
      guarantee in GOVERNANCE.md's Deprecation Policy — exempt by
      construction, not by exception, since sandbox entries carry
      sandboxStatus, never the permanent-tier status enum below.
      Resolves under https://www.w3id.org/openevo/sandbox/concept/{id}.

  sandboxStatus:
    type: string
    enum: [active, archived, promoted]
    description: >
      Lifecycle for sandbox-tier entries only (RFC-0001) — a wholly
      separate, smaller vocabulary from the permanent-tier `status` enum
      below, and never intersects with it. `archived` is set
      automatically once `sandboxMeta.expiresOn` passes without
      promotion; `promoted` means a permanent-tier entity now exists via
      the ordinary RFC process, at which point this sandbox entry itself
      becomes historical.

  sandboxMeta:
    type: object
    description: >
      Provenance/TTL metadata required on every sandbox-tier entry
      (RFC-0001). `expiresOn` is set 12 months from `created` at
      authoring time (IETF Internet-Draft convention); entries not
      promoted before then are auto-archived.
    properties:
      created:
        type: string
        format: date
      expiresOn:
        type: string
        format: date
      status:
        "$ref": "#/$defs/sandboxStatus"
    required: [created, expiresOn, status]
    additionalProperties: false

  alignmentConceptRef:
    type: string
    pattern: "^[A-Z0-9\\-]+-v[0-9]+\\.[0-9]+\\.[0-9]+:OE-(CONCEPT|COMPETENCY)-[0-9]{6}$"
    description: >
      A `{vocabulary}:{conceptId}` reference used by Alignment records
      (subject/object), e.g. "BIO-CORE-v1.0.0:OE-CONCEPT-000102". Also
      accepts `OE-COMPETENCY-######` (RFC-0008), since Phase 2 alignment
      records may now connect an oe:Concept to an oe:Competency (e.g. a
      vocabulary concept to a specific NGSS performance expectation), not
      only concept-to-concept. Deliberately keyed on the permanent
      conceptId/competencyId, never the mutable label, so an alignment
      record cannot silently desynchronize from its target on a
      legitimate label edit (see conceptId, §4.4 of the specification).

  vocabRef:
    type: string
    pattern: "^[A-Z0-9\\-]+-v[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: >
      Reference to a versioned controlled vocabulary, e.g.
      "BIO-CORE-v1.0.0" or "OE-INTERDISCIPLINARY-v1.0.0". Resolves under
      https://www.w3id.org/openevo/vocab/{name}.

  semver:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Semantic version, MAJOR.MINOR.PATCH.

  status:
    type: string
    enum: [proposed, accepted, stable, deprecated, superseded, retracted]
    description: >
      Lifecycle status per GOVERNANCE.md. `retracted` (RFC-0001) is a
      parallel terminal state to `deprecated`/`superseded`, reachable
      directly from `accepted`/`stable` — it is not sequential after
      `deprecated`. It means "accepted in error, or no longer endorsed by
      the maintainers," with no implied replacement, unlike `deprecated`'s
      implicit supersession.

  retractionNote:
    type: string
    description: >
      Optional free-text explanation attached to an entity carrying
      `status: retracted` (RFC-0001). Additive field — existing entries
      are not required to be migrated.

  languageTag:
    type: string
    pattern: "^[a-z]{2}(-[A-Z]{2})?$"
    description: BCP-47-style language tag, e.g. "en", "es", "pt-BR".

  # --- Multilingual field shapes -----------------------------------------

  localizedString:
    type: object
    description: >
      Map of language tag -> plain string. "en" is required as the
      ecosystem-wide fallback language; additional languages are optional
      and additive (do not require a schema version bump to add).
    propertyNames:
      "$ref": "#/$defs/languageTag"
    additionalProperties:
      type: string
    required: [en]
    minProperties: 1

  localizedStringArray:
    type: object
    description: Map of language tag -> array of strings (e.g. aliases).
    propertyNames:
      "$ref": "#/$defs/languageTag"
    additionalProperties:
      type: array
      items:
        type: string

  localizedDisciplinaryDefinitions:
    type: object
    description: >
      Map of language tag -> (discipline -> definition text). Discipline
      keys are free-form (e.g. "biology", "culture", "education", "ai",
      "general") to support the ConceptBase disambiguation model without
      enumerating disciplines in the schema itself.
    propertyNames:
      "$ref": "#/$defs/languageTag"
    additionalProperties:
      type: object
      additionalProperties:
        type: string
      minProperties: 1
    required: [en]
    minProperties: 1

  # --- Common structured fields -----------------------------------------

  conceptEmphasisRef:
    type: object
    description: >
      A reference from a Strand or LearningObject to a Concept it
      addresses (oe:hasConcept), tagged with `emphasis` so horizontal
      coherence auditing (§13.3) can distinguish concepts a Strand is
      structurally organized around (primary) from concepts pulled in
      to reinforce cross-strand relations (reinforcing). Shared by
      strand.schema.yaml and learningObject.schema.yaml.
    properties:
      id:
        "$ref": "#/$defs/conceptId"
      emphasis:
        type: string
        enum: [primary, reinforcing]
    required: [id, emphasis]
    additionalProperties: false

  citation:
    type: object
    properties:
      text:
        type: string
      url:
        type: string
        format: uri
      doi:
        type: string
    required: [text]
    additionalProperties: false

  author:
    type: object
    properties:
      name: { type: string }
      orcid: { type: string }
      affiliation: { type: string }
    required: [name]
    additionalProperties: false

  extensions:
    type: object
    description: >
      Open, namespaced escape hatch for forward-compatible fields
      introduced in later phases (e.g. alignment stubs, evidence links)
      without requiring a breaking schema change. Keys SHOULD be
      namespaced, e.g. "oe:phase2.alignmentHint".
    additionalProperties: true

  conceptbaseManifest:
    type: object
    description: >
      The dependency manifest every ConceptBase-consuming repository
      declares (see Federated Repository Model, Spec v0.2). Reused here
      via $ref rather than redefined per schema, so LPM files, Collection
      files, and standalone repo manifest files all share one structure.
    properties:
      ontology:
        type: string
        pattern: "^OE-ONTOLOGY-v[0-9]+\\.[0-9]+\\.[0-9]+$"
      vocabularies:
        type: array
        items:
          "$ref": "#/$defs/vocabRef"
        minItems: 1
      gradeSchema:
        type: string
        description: "Reserved for Phase 3 — optional until grade-schemas/ exists."
      subjectSchema:
        type: string
        description: "Reserved for Phase 3 — optional until subject-schemas/ exists."
      acknowledgedDeprecations:
        type: array
        items:
          type: string
        description: >
          Concept/vocabulary IDs this repo knowingly depends on despite
          deprecated status, per the compatibility-checker rule in
          GOVERNANCE.md.
    required: [ontology, vocabularies]
    additionalProperties: false