name: Deploy ConceptBase Explorer to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["app/**", "registry/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site (app/ + generated registry/)
        run: |
          mkdir -p _site/registry
          cp -r app/. _site/
          cp -r registry/. _site/registry/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
