# ============================================================================
# OpenEvo ConceptBase — Controlled Vocabulary: UNESCO AI Competency
# Framework for Teachers (AI CFT)
# ============================================================================
# Path: /vocabularies/UNESCO-AI-CFT-v1.0.0.yaml
#
# UNESCO's "AI competency framework for teachers" (2024, ISBN 978-92-3-100707-1,
# https://doi.org/10.54675/ZJTE2084): 15 competencies across 5 dimensions
# (Human-centred mindset, Ethics of AI, AI foundations and applications,
# AI pedagogy, AI for professional development), each spanning 3 progression
# levels (Acquire, Deepen, Create) -- Table 1 of the source document.
# Transcribed 2026-07-22 from the primary PDF.
#
# License: the source document states "This publication is available in
# Open Access under the Attribution-ShareAlike 3.0 IGO (CC-BY-SA 3.0 IGO)
# license" -- an explicit, unambiguous open grant, but a different version
# (3.0 IGO) than the four patterns scripts/case_license_gate.py currently
# recognizes as ALLOW_FULL (which are all 4.0). More substantively: OECB's
# own content license is CC-BY-NC-SA-4.0 (RFC-0004); incorporating
# CC-BY-SA-3.0-IGO content into a differently-licensed (NC-restricted)
# corpus raises a share-alike compatibility question that is a genuine
# open item for maintainer/legal review, not resolved by this RFC -- see
# RFC-0011. Pending that review, only the framework's own short competency
# BLOCK TITLES are reproduced here (e.g. "Human agency", "Ethical
# principles") -- 2-4 word functional labels, not the source's descriptive
# paragraphs -- kept at `status: proposed` accordingly.
#
# Structure: 2-level hierarchy via skos:broader -- 5 Dimension entries (top
# level) -> 15 progression-level Competency Block entries, each
# skos:broader -> its Dimension. humanCodingScheme follows the source
# document's own "{dimension}.{level}" numbering (e.g. "1.1" = Human-centred
# mindset x Acquire), where level 1/2/3 = Acquire/Deepen/Create.
# ============================================================================

