# ============================================================================
# OpenEvo ConceptBase — Controlled Vocabulary: DigCompEdu
# ============================================================================
# Path: /vocabularies/DIGCOMPEDU-v1.0.0.yaml
#
# The European Framework for the Digital Competence of Educators (DigCompEdu),
# Joint Research Centre (Redecker, C. 2017, EUR 28775 EN), as maintained on
# the JRC's DigCompEdu framework page: 6 competence areas, 22 individual
# competencies. Transcribed 2026-07-22 from
# https://joint-research-centre.ec.europa.eu/digcompedu/digcompedu-framework_en
#
# License note (RFC-0011): only the framework's own short official area/
# competency TITLES are reproduced here (e.g. "1.1 Organisational
# communication") -- not the JRC report's longer descriptive prose, which
# this vocabulary does not reproduce and whose license was not confirmed at
# authoring time. Titles of this length and functional character (2-5 words,
# naming a competency, not expressing an idea) sit in the same low-risk
# category as NGSS/AI4K12's short codes per
# docs/design-notes/state-standards-licensing.md's "not blocked: ... a small
# number of hand-picked, clearly-attributed illustrative quotes" reasoning.
# Explicit confirmation of the EU's reuse policy (Commission Decision
# 2011/833/EU or a specific CC grant) for this report is flagged as an open
# item before any proposed -> accepted promotion -- see RFC-0011.
#
# Structure: 2-level hierarchy via skos:broader -- 6 Area entries (top level)
# -> 22 Competency entries, each skos:broader -> its Area. humanCodingScheme
# uses DigCompEdu's own numbering (e.g. "1.1", "2.3").
# ============================================================================

meta:
  id: DIGCOMPEDU
  version: 1.0.0
  status: proposed
  scope: >
    European Framework for the Digital Competence of Educators (DigCompEdu):
    6 competence areas, 22 competencies, covering educators' professional
    engagement, digital resources, teaching and learning, assessment,
    empowering learners, and facilitating learners' digital competence.
  discipline: teacher-education
  license: unconfirmed -- see license note above; only short official titles reproduced
  authors:
    - name: OpenEvo ConceptBase Maintainers
  conformsTo: OE-SCHEMA-COMPETENCY-v1.1.0
  phase: 1

