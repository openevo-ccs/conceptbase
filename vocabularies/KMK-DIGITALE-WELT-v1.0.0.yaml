# ============================================================================
# OpenEvo ConceptBase — Controlled Vocabulary: KMK "Kompetenzen in der
# digitalen Welt"
# ============================================================================
# Path: /vocabularies/KMK-DIGITALE-WELT-v1.0.0.yaml
#
# The Kultusministerkonferenz (KMK) strategy "Bildung in der digitalen Welt"
# (Beschluss vom 08.12.2016, i.d.F. vom 07.12.2017) defines a six-area
# "Kompetenzrahmen: Kompetenzen in der digitalen Welt" for German school
# students. Transcribed 2026-07-22 from the primary PDF (pp. 16-19),
# https://www.kmk.org/fileadmin/Dateien/veroeffentlichungen_beschluesse/2016/2016_12_08-Bildung-in-der-digitalen-Welt.pdf
#
# License note (RFC-0011): the source document carries a bare "© 2016 KMK
# Berlin" copyright notice with no explicit reuse/open-license grant found
# (checked front matter and back matter). Per
# scripts/case_license_gate.py's classification logic this is a
# CITATION_ONLY case (no redistribution grant, no explicit prohibition
# either) -- default-safe. What is reproduced here is limited to the
# framework's own short competency-area/sub-area/item TITLES (each a
# functional phrase of a few words, e.g. "1.1.1 Arbeits- und Suchinteressen
# klären und festlegen"), not any of the surrounding explanatory prose --
# the same low-risk category as DIGCOMPEDU and UNESCO-AI-CFT in this
# release. Explicit confirmation of KMK's reuse terms is flagged as an open
# item before any proposed -> accepted promotion -- see RFC-0011.
#
# Numbering note: the source PDF's own printed numbering repeats "1.2.2"
# and "1.2.3" for what are structurally the two items under section "1.3
# Speichern und Abrufen" (a transcription/typesetting inconsistency in the
# original, not introduced here) -- normalized to 1.3.1/1.3.2 in this
# vocabulary's humanCodingScheme for internal consistency, per the same
# "construct traceable codes when the source's own aren't clean" allowance
# used by RFC-0007 for AI4K12's LO/EU cells.
#
# Structure: 3-level hierarchy via skos:broader -- 6 Kompetenzbereich
# entries (top level) -> 22 sub-area entries -> 61 individual competency
# entries. English glosses in `statement.en` are OECB-authored translations
# for ecosystem-wide accessibility; `statement.de` carries the source
# document's own wording as the framework's authoritative language.
# ============================================================================

meta:
  id: KMK-DIGITALE-WELT
  version: 1.0.0
  status: proposed
  scope: >
    KMK Kompetenzrahmen "Kompetenzen in der digitalen Welt" (2016/2017):
    6 Kompetenzbereiche, 22 sub-areas, 61 individual competencies for
    students' digital competence across German school curricula.
  discipline: cross-subject
  license: unconfirmed (bare copyright notice, no reuse grant found) -- see license note above and RFC-0011
  authors:
    - name: OpenEvo ConceptBase Maintainers
  conformsTo: OE-SCHEMA-COMPETENCY-v1.1.0
  phase: 1

