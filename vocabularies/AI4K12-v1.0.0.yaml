# to OECB's own content license as of RFC-0004, so full statement text is
# included with attribution; no citationOnly restriction applies (contrast
# the Virginia CASE Satchel finding).
#
# Structure (RFC-0007): 3-level hierarchy via skos:broader --
#   Big Idea (5) -> Concept-row (44) -> per-grade-band LO/EU pair (334).
# LO (Learning Objective) and EU (Enduring Understanding) are modeled as
# separate entries per RFC-0007, since they are pedagogically distinct
# (what students DO vs. what they KNOW). "Unpacked" enrichment prose and
# "Activity"/"Resource" text from the source charts are intentionally not
# reproduced -- each entry's `statement` is a single concise statement,
# matching CASE's own fullStatement convention, not the source's full
# explanatory prose. A cell absent from the source's grade-band table
# ("N/A") has no corresponding entries.
# ============================================================================

